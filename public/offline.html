<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MANARAH</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #0b0f17;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      padding: 30px;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .logo {
      color: #0e7a3e;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 30px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 10px 0;
    }
    p {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 25px 0;
    }
    .btn {
      background-color: #0e7a3e;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      width: 100%;
    }
    .btn:hover {
      background-color: #0b5e2f;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">MANARAH</div>
    <div class="subtitle">LEARN • TEACH • COMPETE</div>
    <div class="icon">📶</div>
    <h1>You are offline</h1>
    <p>Please check your internet connection. Once you are back online, you can reload the page to continue learning.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
